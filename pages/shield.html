<!DOCTYPE html>
<html>

<head>

<title>Helmet Shields | TK Leather Shields</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* Base */

body{
font-family:Arial, sans-serif;
margin:0;
background:#0f172a;
color:white;
text-align:center;
}

/* Header */

header{
background:black;
padding:20px;
box-shadow:0 2px 8px rgba(0,0,0,.5);
}

nav a{
color:white;
margin:0 15px;
text-decoration:none;
font-weight:bold;
}

nav a:hover{
color:#d1d5db;
}

/* Page */

section{
padding:60px 20px;
max-width:1200px;
margin:auto;
}

h1{
font-size:36px;
margin-bottom:10px;
}

/* Product Grid */

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:35px;
margin-top:40px;
max-width:900px;
margin-left:auto;
margin-right:auto;
}

/* Product Card */

.card{
background:#1f2937;
padding:22px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,.35);
transition:.25s;
}

.card:hover{
transform:translateY(-4px);
box-shadow:0 16px 35px rgba(0,0,0,.45);
}

/* Main Product Image */

.main-image{
width:220px;
display:block;
margin:10px auto 15px auto;
border-radius:8px;
transition:.25s;
}

.main-image:hover{
transform:scale(1.05);
}

/* Thumbnail Gallery */

.gallery{
display:flex;
justify-content:center;
gap:6px;
margin-bottom:12px;
}

.gallery img{
width:60px;
border-radius:6px;
cursor:pointer;
transition:.2s;
}

.gallery img:hover{
transform:scale(1.1);
}

/* Product Name */

h3{
margin-top:8px;
margin-bottom:6px;
font-size:20px;
}

/* Price */

p{
font-size:18px;
margin:5px 0 10px 0;
}

/* Buttons */

.button{
display:inline-block;
background:#8b1c1c;
color:white;
padding:10px 20px;
margin-top:10px;
text-decoration:none;
border-radius:6px;
font-weight:bold;
transition:.2s;
}

.button:hover{
background:#b91c1c;
transform:scale(1.05);
}

/* Footer */

footer{
margin-top:60px;
padding:30px;
background:black;
}

/* Mobile */

@media (max-width:700px){

.grid{
grid-template-columns:1fr;
}

}

</style>

</head>

<body>

<header>

<h2>TK Leather Shields</h2>

<nav>
<a href="../index.html">Home</a>
<a href="../shop.html">Shop</a>
</nav>

</header>

<section>

<h1>Helmet Shields</h1>

<div class="grid">

<!-- PGFD Shield -->

<div class="card">

<img src="../images/shield/pgfg_standard_shield_main.png" class="main-image">

<div class="gallery">
<img src="../images/shield/pgfg_standard_shield_main.png">
<img src="../images/shield/pgfd_shield_angle1.png">
</div>

<h3>PGFD Standard Shield</h3>

<p>$70</p>

<a href="pgfd_order.html" class="button">Customize / Order</a>

</div>


<!-- Boston Shield -->

<div class="card">

<img src="../images/shield/boston_style_shield.png" class="main-image">

<div class="gallery">
<img src="../images/shield/boston_style_shield.png">
<img src="../images/shield/boston_style_angle1.png">
</div>

<h3>Boston Style Shield</h3>

<p>$75</p>

<a href="boston_order.html" class="button">Customize / Order</a>

</div>


<!-- Standard Shield -->

<div class="card">

<img src="../images/shield/standard_shield_angle1.png" class="main-image">

<div class="gallery">
<img src="../images/shield/standard_shield_angle1.png">
<img src="../images/shield/standard_shield_angle2.png">
<img src="../images/shield/standard_shield_angle3.png">
</div>

<h3>Standard Style Shield</h3>

<p>$80</p>

<a href="custom_shield_order.html" class="button">Customize / Order</a>

</div>


<!-- NY Style Shield -->

<div class="card">

<img src="../images/shield/ny_style_shield.png" class="main-image">

<div class="gallery">
<img src="../images/shield/ny_style_shield.png">
<img src="../images/shield/ny_style_shield_angle1.png">
</div>

<h3>NY Style Shield</h3>

<p>$85</p>

<a href="custom_shield_order.html" class="button">Customize / Order</a>

</div>

</div>

</section>

<footer>

<p>© 2026 TK Leather Shields</p>

</footer>


<!-- Thumbnail click image swap -->

<script>

document.querySelectorAll(".gallery img").forEach(img => {

img.addEventListener("click", function(){

const card = this.closest(".card");
const main = card.querySelector(".main-image");

main.src = this.src;

});

});

</script>

</body>

</html>
