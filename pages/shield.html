<!DOCTYPE html>
<html>

<head>

<title>Helmet Shields | TK Leather Shields</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* Base */

body{
font-family:Arial, sans-serif;
margin:0;
background:#0f172a;
color:white;
text-align:center;
}

/* Header */

header{
background:black;
padding:20px;
box-shadow:0 2px 8px rgba(0,0,0,.5);
}

nav a{
color:white;
margin:0 15px;
text-decoration:none;
font-weight:bold;
}

nav a:hover{
color:#d1d5db;
}

/* Page Section */

section{
padding:60px 20px;
max-width:1200px;
margin:auto;
}

h1{
font-size:36px;
margin-bottom:10px;
}

/* Grid Layout */

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:35px;
margin-top:40px;
max-width:900px;
margin-left:auto;
margin-right:auto;
}

/* Product Cards */

.card{
background:#1f2937;
padding:22px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,.35);
transition:transform .25s ease, box-shadow .25s ease;
}

.card:hover{
transform:translateY(-4px);
box-shadow:0 16px 35px rgba(0,0,0,.45);
}

/* Main Product Image */

.main-image{
width:220px;
display:block;
margin:10px auto 15px auto;
border-radius:8px;
transition:transform .25s ease;
}

.main-image:hover{
transform:scale(1.05);
}

/* Thumbnail Gallery */

.gallery{
display:flex;
justify-content:center;
gap:10px;
margin-bottom:15px;
}

.gallery img{
width:60px;
border-radius:6px;
cursor:pointer;
transition:transform .2s ease;
}

.gallery img:hover{
transform:scale(1.1);
}

/* Product Title */

h3{
margin-top:8px;
margin-bottom:6px;
font-size:20px;
}

/* Price */

p{
font-size:18px;
margin:5px 0 10px 0;
}

/* Button */

.button{
display:inline-block;
background:#7f1d1d;
color:white;
padding:10px 20px;
margin-top:10px;
text-decoration:none;
border-radius:6px;
font-weight:bold;
transition:background .2s ease, transform .15s ease;
}

.button:hover{
background:#991b1b;
transform:scale(1.05);
}

</style>

</head>
