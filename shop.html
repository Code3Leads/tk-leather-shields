<!DOCTYPE html>
<html>

<head>

<title>Shop | TK Leather Shields</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:Arial, sans-serif;
margin:0;
background:#0f172a;
color:white;
text-align:center;
}

/* Header */

header{
background:black;
padding:20px;
}

nav a{
color:white;
margin:0 15px;
text-decoration:none;
font-weight:bold;
}

/* Page Section */

section{
padding:60px 20px;
max-width:1200px;
margin:auto;
}

/* Grid Layout */

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:30px;
margin-top:40px;
}

/* Cards */

.card{
background:#1f2937;
padding:20px;
border-radius:10px;
transition:transform .2s;
}

.card:hover{
transform:scale(1.03);
}

.card img{
width:100%;
border-radius:8px;
}

.card a{
color:white;
text-decoration:none;
}

footer{
background:black;
padding:30px;
margin-top:60px;
}

</style>

</head>

<body>

<header>

<h2>TK Leather Shields</h2>

<nav>
<a href="index.html">Home</a>
<a href="shop.html">Shop</a>
</nav>

</header>

<section>

<h1>Shop</h1>

<div class="grid">

<div class="card">
<a href="#">
<img src="images/shields/pgfd_shield.png">
<h3>Helmet Shields</h3>
<p>Starting at $70</p>
</a>
</div>

<div class="card">
<a href="#">
<img src="images/straps/basic_radio_strap.png">
<h3>Radio Straps</h3>
<p>Starting at $95</p>
</a>
</div>

<div class="card">
<a href="#">
<img src="images/pouches/basic_radio_pouch.png">
<h3>Radio Pouches</h3>
<p>Starting at $65</p>
</a>
</div>

<div class="card">
<a href="#">
<img src="images/accessories/mask_cover.png">
<h3>Accessories</h3>
</a>
</div>

</div>

</section>

<footer>

<p>© 2026 TK Leather Shields</p>

</footer>

</body>
</html>
